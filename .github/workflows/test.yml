name: API Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman newman-reporter-html

      - name: Run Postman collection
        run: |
          mkdir -p newman
          newman run TASKS.postman_collection.json \
            -e ClickUp.postman_environment.json \
            -r cli,html \
            --reporter-html-export newman/report.html
          ls -R

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: newman/report.html
